<!--
  ThirdEye · prototype v0.1  (single-file, no build step, no API keys)
  ------------------------------------------------------------------
  A dark, tactical 3D globe (CesiumJS) that renders genuinely-live, key-free
  public feeds, each labelled with its evidence class:
     SPACE       satellites   CelesTrak TLE + satellite.js  (SGP4 model output)
                 constellatns Starlink / GNSS / geo belt    (SGP4 model output)
                 launches     Launch Library 2              (official schedule)
                 auroral oval NOAA SWPC OVATION             (model now-cast)
                 fireballs    NASA JPL CNEOS                (official, US Gov sensors)
     ENVIRONMENT earthquakes  USGS all_day GeoJSON          (official report)
                 nat. hazards NASA EONET                    (official aggregate)
                 cyclones     NOAA NHC active storms        (official advisory)
                 disaster alr GDACS EVENTS4APP (UN/EC)       (official alert score)
                 precip radar RainViewer composite          (observed raster)
                 UK floods    Environment Agency RT          (official flood warning)
     AIR         military ac  airplanes.live /v2/mil        (direct ADS-B observation)
                 airport wx   NOAA AWC METAR                (official station obs)
     SIGNALS     GPS interfer GPSJam (ADS-B derived)         (inferred, daily aggregate)
     INFRASTR.   subsea cables TeleGeography                 (reference geometry)

  Every feed has a matching entry in the in-app SOURCES registry (licence, rate
  limits, auth, CORS) and in docs/sources.md — the brief's three-part "done" bar.

  Design + honesty rules follow the ThirdEye brief:
    - restraint: thin chrome, detail on demand, semantic colour, shape symbology
    - integrity: every object shows its evidence class + freshness; propagated
      positions are labelled MODEL OUTPUT, never dressed up as observation
    - the view themes (night-vision / thermal) are cosmetic post-processing and
      are labelled "VISUAL THEME — not sensor data"
    - no localStorage/sessionStorage (so it runs identically as a file or an artifact)

  Hosting: when served over http(s) the feed calls go to same-origin /feeds/*
  paths that Netlify proxies to the upstreams (see netlify.toml) — this removes
  the browser CORS problem without a backend. Opened as a local file it calls the
  upstreams directly and degrades gracefully (honest "feed unavailable") if blocked.
-->

<style>

  --bg:#0A0E14; --bg2:#0D1117;

  --txt:#C7D2DD; --txt-dim:#7C8794; --txt-mute:#4C5661;
  --white:#E8EEF4;

  --mono:'JetBrains Mono','IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --shadow:0 8px 40px rgba(0,0,0,.55);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
  font-family:var(--sans);overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
button{font-family:inherit;color:inherit;cursor:pointer;background:none;border:none}
input{font-family:inherit}
::selection{background:rgba(242,169,0,.28)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

/* ---------------- globe ---------------- */
#cesiumContainer{position:fixed;inset:0;background:#05070A}
#cesiumContainer canvas{outline:none}
/* hide Cesium's default UI furniture we don't use */
.cesium-viewer-bottom{display:none!important}
.cesium-widget-credits{display:none!important}
.cesium-credit-lightbox-overlay{display:none!important}

/* ---------------- view-mode (cosmetic) overlays ---------------- */
#vm-overlays{position:fixed;inset:0;pointer-events:none;z-index:5;opacity:0;transition:opacity .35s}
body.vm-on #vm-overlays{opacity:1}
.vm-scan{position:absolute;inset:0;
  background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.16) 3px,rgba(0,0,0,0) 4px);
  mix-blend-mode:multiply;opacity:0}
.vm-vig{position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(0,0,0,0) 45%,rgba(0,0,0,.55) 100%);opacity:0}
.vm-tint{position:absolute;inset:0;mix-blend-mode:overlay;opacity:0}
body.mode-nvg #cesiumContainer{filter:brightness(1.05) contrast(1.15) grayscale(1) sepia(1) hue-rotate(63deg) saturate(5.5)}
body.mode-nvg .vm-scan{opacity:.9}
body.mode-nvg .vm-vig{opacity:.95}
body.mode-nvg .vm-tint{background:#00ff88;opacity:.10}
body.mode-thermal #cesiumContainer{filter:grayscale(1) contrast(1.5) brightness(1.06) sepia(1) hue-rotate(-22deg) saturate(4.2)}
body.mode-thermal .vm-vig{opacity:.7}
body.mode-thermal .vm-tint{background:linear-gradient(45deg,#3a0a6b,#ff2d00 55%,#ffd000);opacity:.14}

/* faint global grid / reticle (tactical motif, disciplined) */
#reticle{position:fixed;inset:0;pointer-events:none;z-index:6;opacity:0;transition:opacity .3s}
body.reticle-on #reticle{opacity:.5}

/* ---------------- generic panel look (corner brackets) ---------------- */
.panel{background:var(--panel);backdrop-filter:blur(13px) saturate(1.1);-webkit-backdrop-filter:blur(13px);
  border:1px solid var(--line);position:relative;box-shadow:var(--shadow)}
.panel::before,.panel::after,.brk::before,.brk::after{content:"";position:absolute;width:9px;height:9px;pointer-events:none}
.panel::before,.brk::before{top:-1px;left:-1px;border-top:1px solid var(--accent);border-left:1px solid var(--accent)}
.panel::after,.brk::after{bottom:-1px;right:-1px;border-bottom:1px solid var(--accent);border-right:1px solid var(--accent)}
.hdr{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--txt-dim);font-weight:600}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.chip{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  padding:2px 6px;border:1px solid var(--line-2);border-radius:2px;color:var(--txt-dim);white-space:nowrap}

/* ---------------- top HUD bar ---------------- */

.sw::after{content:"";position:absolute;top:1px;left:1px;width:12px;height:12px;border-radius:50%;background:var(--txt-mute);transition:.16s}

.lrow .tools{display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.solobtn{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;color:var(--txt-mute);border:1px solid var(--line);

.badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:13px}
.badge{font-family:var(--mono);font-size:9px;letter-spacing:.07em;text-transform:uppercase;padding:3px 7px;border-radius:2px;

.sect .ln{flex:1;height:1px;background:var(--line)}
.kv{display:grid;grid-template-columns:96px 1fr;gap:5px 10px;font-size:11.5px}
.kv .k{color:var(--txt-mute);font-family:var(--mono);font-size:10px;letter-spacing:.04em;padding-top:1px}
.kv .v{color:var(--txt);font-family:var(--mono);word-break:break-word}

.ibtn:hover{border-color:var(--accent);color:var(--accent)}

#status{font-family:var(--mono);font-size:10px;color:var(--txt-mute);letter-spacing:.05em;text-align:right}

.ltabs{display:flex;gap:2px}
.lt{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt-dim);padding:4px 9px;border:1px solid transparent;border-radius:3px}
.lt:hover{color:var(--txt)}
.lt.on{color:var(--accent);border-color:rgba(242,169,0,.4);background:rgba(242,169,0,.07)}

/* ---------------- events list ---------------- */
.erow{display:flex;align-items:center;gap:9px;padding:7px 11px;border-left:2px solid transparent;cursor:pointer}
.erow:hover{background:rgba(255,255,255,.03);border-left-color:var(--accent)}
.edot{width:8px;height:8px;border-radius:50%;flex:none;box-shadow:0 0 6px rgba(0,0,0,.4)}
.emeta{flex:1;min-width:0}
.etitle{font-size:12px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.esub{font-size:9.5px;color:var(--txt-mute);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.emore,.eempty{padding:8px 11px;font-size:10px;color:var(--txt-mute);font-family:var(--mono);line-height:1.6}

/* ---------------- toast ---------------- */
#toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(8px);z-index:40;
  background:rgba(13,17,23,.96);border:1px solid var(--line-2);color:var(--txt);font-size:11.5px;
  font-family:var(--mono);letter-spacing:.02em;padding:9px 14px;border-radius:4px;box-shadow:var(--shadow);
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;max-width:72vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (max-width:820px){
  #left{width:212px}#intel{width:270px}
  #brand span,.ws-tabs{display:none}
}

(function(){

/* ---------- feed routing (Netlify proxy when hosted, direct when local) ---------- */

};

/* ---------- source registry (licence · rate · auth · CORS · evidence) ----------
   The brief's "done" bar for a feed = (1) a source-registry entry, (2) an adapter,
   (3) a LayerSpec. This object is the in-app source registry; docs/sources.md carries
   the same facts in prose. Every LAYER points at a SOURCES key via its `srcKey`. */
var SOURCES = {
  celestrak:     { name:'CelesTrak GP (TLE)', org:'CelesTrak / Dr T.S. Kelso', url:'https://celestrak.org',
                   licence:'Free reuse, attribution requested', rate:'Be gentle; cache ≥2h per group', auth:'none',
                   cors:'no CORS headers → proxied when hosted', evidence:'MODEL OUTPUT (SGP4 propagation)' },
  usgs_quakes:   { name:'USGS Earthquake Hazards (all_day)', org:'U.S. Geological Survey', url:'https://earthquake.usgs.gov',
                   licence:'U.S. public domain', rate:'Feed regenerates ~1/min', auth:'none',
                   cors:'CORS-enabled → direct works, proxied for safety', evidence:'OFFICIAL REPORT (instrumental)' },
  airplanes_live:{ name:'airplanes.live ADS-B (/v2/mil)', org:'airplanes.live community', url:'https://airplanes.live',
                   licence:'Free, non-commercial; attribution', rate:'~1 req/s cap', auth:'none',
                   cors:'proxied when hosted', evidence:'DIRECT OBSERVATION (ADS-B)' },
  eonet:         { name:'NASA EONET v3', org:'NASA Earth Observatory', url:'https://eonet.gsfc.nasa.gov',
                   licence:'NASA open data', rate:'Updates ~hourly', auth:'none',
                   cors:'CORS-enabled → direct', evidence:'OFFICIAL REPORT (aggregated)' },
  ll2:           { name:'Launch Library 2', org:'The Space Devs', url:'https://thespacedevs.com',
                   licence:'CC BY 4.0', rate:'~15 req/hr unauth', auth:'none (higher limits with key)',
                   cors:'CORS-enabled → direct', evidence:'OFFICIAL REPORT (scheduled)' },
  swpc_ovation:  { name:'NOAA SWPC OVATION aurora', org:'NOAA Space Weather Prediction Center', url:'https://www.swpc.noaa.gov',
                   licence:'U.S. public domain', rate:'Now-cast refresh ~5 min', auth:'none',
                   cors:'CORS-enabled → direct', evidence:'MODEL OUTPUT (now-cast)' },
  nhc_storms:    { name:'NHC Active Tropical Cyclones', org:'NOAA National Hurricane Center', url:'https://www.nhc.noaa.gov',
                   licence:'U.S. public domain', rate:'Advisories ~every 6h (intermediate 3h)', auth:'none',
                   cors:'no CORS headers → proxied when hosted', evidence:'OFFICIAL REPORT (forecast advisory)' },
  gdacs:         { name:'GDACS multi-hazard alerts', org:'UN OCHA / European Commission JRC', url:'https://www.gdacs.org',
                   licence:'Free reuse, attribution (GDACS)', rate:'Event list refreshed continuously', auth:'none',
                   cors:'inconsistent CORS → proxied when hosted', evidence:'OFFICIAL REPORT (alert scoring)' },
  rainviewer:    { name:'RainViewer global radar', org:'RainViewer', url:'https://www.rainviewer.com',
                   licence:'Free tier, attribution required', rate:'Frames every ~10 min', auth:'none',
                   cors:'permissive CORS → direct', evidence:'OBSERVED (composite radar/precip)' },
  ea_floods:     { name:'EA flood warnings (real-time)', org:'UK Environment Agency', url:'https://environment.data.gov.uk/flood-monitoring',
                   licence:'Open Government Licence v3', rate:'Warnings update ~every 15 min', auth:'none',
                   cors:'proxied when hosted', evidence:'OFFICIAL REPORT (statutory flood warning)' },
  jpl_fireball:  { name:'CNEOS fireball reports', org:'NASA JPL / CNEOS', url:'https://cneos.jpl.nasa.gov/fireballs',
                   licence:'NASA/JPL open data', rate:'Sporadic (as events are detected)', auth:'none',
                   cors:'CORS-open → direct, proxied for safety', evidence:'OFFICIAL REPORT (US Gov sensors)' },
  gpsjam:        { name:'GPSJam GPS interference', org:'GPSJam (J. Wiseman) · data © adsbexchange.com', url:'https://gpsjam.org',
                   licence:'Attribution; underlying data © adsbexchange.com', rate:'Daily aggregate (one CSV per day)', auth:'none',
                   cors:'no CORS headers → proxied when hosted; needs h3-js to draw hexes',
                   evidence:'INFERRED (aggregated ADS-B navigation-integrity)' },
  cables:        { name:'Submarine cable map', org:'TeleGeography', url:'https://www.submarinecablemap.com',
                   licence:'Free for reference; © TeleGeography', rate:'Reference geometry (updated periodically)', auth:'none',
                   cors:'proxied when hosted', evidence:'REFERENCE (infrastructure geometry)' },
  awc_metar:     { name:'Aviation Weather Center METAR', org:'NOAA / NWS Aviation Weather Center', url:'https://aviationweather.gov',
                   licence:'U.S. Government public domain', rate:'METARs hourly (SPECIs ad hoc)', auth:'none',
                   cors:'proxied when hosted', evidence:'OFFICIAL REPORT (station observation)' }
};
function fetchFeed(spec){
  var order = HOSTED ? [spec.proxy, spec.direct] : [spec.direct, spec.proxy];
  var i = 0;
  function attempt(){
    if(i >= order.length) return Promise.reject(new Error('all sources failed'));
    var url = order[i++];
    return fetch(url, {mode:'cors', credentials:'omit'}).then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status+' @ '+url); return r;
    }).catch(function(e){ if(i < order.length) return attempt(); throw e; });
  }
  return attempt();
}

/* ---------- tiny helpers ---------- */
var $ = function(s,r){ return (r||document).querySelector(s); };
var $$ = function(s,r){ return Array.prototype.slice.call((r||document).querySelectorAll(s)); };
function el(t,c,txt){ var e=document.createElement(t); if(c)e.className=c; if(txt!=null)e.textContent=txt; return e; }
function pad(n,l){ n=String(n); while(n.length<l)n='0'+n; return n; }
function svgURI(s){ return 'data:image/svg+xml,'+encodeURIComponent(s); }
function fmtAge(sec){
  if(sec==null||isNaN(sec)) return '—';
  sec=Math.max(0,Math.round(sec));
  if(sec<60) return sec+'s';
  if(sec<3600) return Math.floor(sec/60)+'m '+(sec%60)+'s';
  if(sec<86400) return Math.floor(sec/3600)+'h '+Math.floor(sec%3600/60)+'m';
  return (sec/86400).toFixed(1)+'d';
}
var MON=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

/* ---------- shape symbology (canvas billboards) ----------
   Canvas icons rasterise reliably in Cesium (SVG data-URIs do not, and render
   as black squares in Chrome). Each shape gets a dark halo + light edge so it
   stays legible on both the dark basemaps and bright satellite imagery. */
function makeIcon(size, draw){
  var c=document.createElement('canvas'); c.width=size; c.height=size;
  draw(c.getContext('2d'), size); return c;
}
function chevronIcon(fill){
  return makeIcon(48, function(ctx,s){
    ctx.beginPath();
    ctx.moveTo(s*0.5,s*0.10); ctx.lineTo(s*0.86,s*0.88); ctx.lineTo(s*0.5,s*0.66); ctx.lineTo(s*0.14,s*0.88); ctx.closePath();
    ctx.lineJoin='round';
    ctx.strokeStyle='rgba(0,0,0,0.55)'; ctx.lineWidth=s*0.16; ctx.stroke(); // dark halo (bright bg)
    ctx.fillStyle=fill; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=s*0.05; ctx.stroke(); // crisp edge
  });
}
function diamondIcon(fill){
  return makeIcon(40, function(ctx,s){
    ctx.beginPath();
    ctx.moveTo(s*0.5,s*0.12); ctx.lineTo(s*0.88,s*0.5); ctx.lineTo(s*0.5,s*0.88); ctx.lineTo(s*0.12,s*0.5); ctx.closePath();
    ctx.strokeStyle='rgba(0,0,0,0.55)'; ctx.lineWidth=s*0.16; ctx.stroke();
    ctx.fillStyle=fill; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=s*0.06; ctx.stroke();
  });
}
function triangleIcon(fill){
  return makeIcon(44, function(ctx,s){
    ctx.beginPath();
    ctx.moveTo(s*0.5,s*0.12); ctx.lineTo(s*0.9,s*0.86); ctx.lineTo(s*0.1,s*0.86); ctx.closePath();
    ctx.lineJoin='round';
    ctx.strokeStyle='rgba(0,0,0,0.55)'; ctx.lineWidth=s*0.15; ctx.stroke();
    ctx.fillStyle=fill; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=s*0.05; ctx.stroke();
  });
}
function launchIcon(fill){ // ring + centre dot + upward tick (a launch pad / target)
  return makeIcon(44, function(ctx,s){
    ctx.lineWidth=s*0.14; ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.arc(s*0.5,s*0.5,s*0.30,0,6.2832); ctx.stroke();
    ctx.lineWidth=s*0.10; ctx.strokeStyle=fill; ctx.beginPath(); ctx.arc(s*0.5,s*0.5,s*0.30,0,6.2832); ctx.stroke();
    ctx.fillStyle=fill; ctx.beginPath(); ctx.arc(s*0.5,s*0.5,s*0.085,0,6.2832); ctx.fill();
    ctx.strokeStyle=fill; ctx.lineWidth=s*0.10; ctx.beginPath(); ctx.moveTo(s*0.5,s*0.20); ctx.lineTo(s*0.5,s*0.02); ctx.stroke();
  });
}
function cycloneIcon(fill){ // two curved spiral arms + eye — a hurricane glyph
  return makeIcon(52, function(ctx,s){
    var cx=s*0.5, cy=s*0.5;
    ctx.lineCap='round'; ctx.lineJoin='round';
    function arm(rot){
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(rot);
      ctx.beginPath(); ctx.moveTo(0,-s*0.06);
      ctx.bezierCurveTo(s*0.28,-s*0.10, s*0.34,s*0.16, s*0.10,s*0.34);
      // halo then colour
      ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=s*0.15; ctx.stroke();
      ctx.strokeStyle=fill; ctx.lineWidth=s*0.09; ctx.stroke();
      ctx.restore();
    }
    arm(0); arm(Math.PI);
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.arc(cx,cy,s*0.085,0,6.2832); ctx.fill();
    ctx.fillStyle=fill; ctx.beginPath(); ctx.arc(cx,cy,s*0.055,0,6.2832); ctx.fill();
  });
}
function hexIcon(fill){ // filled hexagon — GDACS alert marker (distinct from EONET triangles)
  return makeIcon(42, function(ctx,s){
    var cx=s*0.5, cy=s*0.5, r=s*0.36;
    ctx.beginPath();
    for(var k=0;k<6;k++){ var a=Math.PI/6 + k*Math.PI/3; var x=cx+r*Math.cos(a), y=cy+r*Math.sin(a);
      k?ctx.lineTo(x,y):ctx.moveTo(x,y); }
    ctx.closePath();
    ctx.strokeStyle='rgba(0,0,0,0.55)'; ctx.lineWidth=s*0.16; ctx.stroke();
    ctx.fillStyle=fill; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=s*0.06; ctx.stroke();
  });
}
var _hazIcons={};
function hazIcon(color){ return _hazIcons[color]||(_hazIcons[color]=triangleIcon(color)); }
function dropIcon(fill){ // teardrop — flood warning marker
  return makeIcon(40, function(ctx,s){
    var cx=s*0.5;
    ctx.beginPath();
    ctx.moveTo(cx,s*0.10);
    ctx.bezierCurveTo(s*0.86,s*0.52, s*0.74,s*0.90, cx,s*0.90);
    ctx.bezierCurveTo(s*0.26,s*0.90, s*0.14,s*0.52, cx,s*0.10);
    ctx.closePath();
    ctx.strokeStyle='rgba(0,0,0,0.55)'; ctx.lineWidth=s*0.15; ctx.stroke();
    ctx.fillStyle=fill; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=s*0.055; ctx.stroke();
  });
}
var _cycIcons={}, _gdacsIcons={}, _dropIcons={};
function cycIcon(color){ return _cycIcons[color]||(_cycIcons[color]=cycloneIcon(color)); }
function gdacsIcon(color){ return _gdacsIcons[color]||(_gdacsIcons[color]=hexIcon(color)); }

function loadScript(src){ return new Promise(function(res,rej){
  var s=document.createElement('script'); s.src=src; s.async=false; s.onload=res; s.onerror=function(){rej(new Error('load fail '+src));}; document.head.appendChild(s);
});}
function setBoot(t){ var b=$('#bootTxt'); if(b)b.textContent=t; }
function bootError(msg){
  var b=$('#boot'); b.classList.add('error'); $('#bootTxt').textContent='Unable to start';
  $('#bootErr').innerHTML=msg; $('#status').textContent='globe engine unavailable';
}

/* GIBS basemap (EPSG:4326, no token). REST tiles; the 500m set is 512×512,
   levels 0-7. (256px was the bug that left the globe black.) */
function gibsProvider(layerId){
  return new Cesium.WebMapTileServiceImageryProvider({
    url:'https://gibs.earthdata.nasa.gov/wmts/epsg4326/best/'+layerId+'/default/500m/{TileMatrix}/{TileRow}/{TileCol}.jpeg',
    layer:layerId, style:'default', format:'image/jpeg', tileMatrixSetID:'500m',
    maximumLevel:7, tileWidth:512, tileHeight:512,
    tilingScheme:new Cesium.GeographicTilingScheme(),
    credit:new Cesium.Credit('NASA EOSDIS GIBS')
  });
}
var BASEMAPS={
  sat:{ label:'Satellite', make:function(){ return new Cesium.UrlTemplateImageryProvider({
          url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
          maximumLevel:19, credit:new Cesium.Credit('Esri, Maxar, Earthstar Geographics') }); }, b:0.9, c:1.05, s:0.9 },
  blue:{ label:'Blue Marble', make:function(){ return gibsProvider('BlueMarble_ShadedRelief_Bathymetry'); }, b:1.0, c:1.05, s:1.0 },
  night:{ label:'Night Lights', make:function(){ return gibsProvider('VIIRS_CityLights_2012'); }, b:1.0, c:1.05, s:0.95 },
  osm:{ label:'Streets', make:function(){ return new Cesium.UrlTemplateImageryProvider({
           url:'https://tile.openstreetmap.org/{z}/{x}/{y}.png', maximumLevel:19,
           credit:new Cesium.Credit('© OpenStreetMap contributors') }); }, b:0.75, c:1.0, s:0.65 }
};
function makeBaseLayer(key){
  var spec=BASEMAPS[key], lyr=new Cesium.ImageryLayer(spec.make());
  lyr.brightness=spec.b; lyr.contrast=spec.c; lyr.saturation=spec.s; lyr.gamma=1.0;
  return lyr;
}
// If the chosen basemap's tiles keep failing (blocked / offline / misconfigured),
// auto-swap to OpenStreetMap so the user is never left staring at empty space.
function attachImageryFallback(layer){
  var fails=0, done=false;
  try{ layer.imageryProvider.errorEvent.addEventListener(function(){
    if(done) return; fails++;
    if(fails>=40 && currentBase!=='osm'){ done=true; setBasemap('osm', true); // only on sustained failure, not transient GIBS blips
      $('#status').textContent='basemap: OSM fallback (satellite tiles unreachable)'; }
  }); }catch(e){}
}

/* switch basemap (silent=true lets the auto-fallback re-enter without a guard) */
function setBasemap(key, silent){
  if(currentBase===key && !silent) return; currentBase=key;
  var np=makeBaseLayer(key);
  viewer.imageryLayers.add(np); viewer.imageryLayers.lowerToBottom(np);
  var old=baseLayer; baseLayer=np; attachImageryFallback(np);
  setTimeout(function(){ try{ if(old) viewer.imageryLayers.remove(old,true); }catch(e){} },500);
  $$('#bl button').forEach(function(b){ b.classList.toggle('on', b.dataset.base===key); });
}

/* =====================================================================
   LAYER: satellites  (CelesTrak TLE -> SGP4 via satellite.js)
   ===================================================================== */
var satRecords=[]; // {name,norad,satrec,entity,epochAgeDays}
function loadSatellites(){
  if(typeof satellite==='undefined'){ LAYERS.sat.status='unavailable'; refreshHealth(); return; }
  LAYERS.sat.status='loading'; refreshHealth();
  // bounded, interesting sets: crewed stations + navigation + brightest visual
  var groups=['stations','gps-ops','visual'];
  Promise.all(groups.map(function(g){
    return fetchFeed(FEEDS.tle(g)).then(function(r){return r.text();}).catch(function(){return '';});
  })).then(function(texts){
    var seen={}, added=0;
    texts.forEach(function(txt){
      var lines=txt.split(/\r?\n/).filter(function(l){return l.trim().length;});
      for(var i=0;i+2<lines.length;i+=3){
        var name=lines[i].trim(), l1=lines[i+1], l2=lines[i+2];
        if(l1[0]!=='1'||l2[0]!=='2') { i-=2; continue; } // resync if header missing
        var norad=l1.substring(2,7).trim();
        if(seen[norad]) continue; seen[norad]=1;
        try{
          var rec=satellite.twoline2satrec(l1,l2);
          var epochAge=(Date.now()/86400000 + 2440587.5) - rec.jdsatepoch;
          satRecords.push({name:name,norad:norad,satrec:rec,epochAge:epochAge,entity:null});
          added++;
        }catch(e){}
      }
    });
    if(!added){ throw new Error('no TLEs parsed'); }
    buildSatEntities();
    LAYERS.sat.count=satRecords.length; LAYERS.sat.status='live';
    updateSatPositions(); refreshHealth(); renderLayers();
  }).catch(function(err){
    // fallback: a couple of embedded TLEs so the layer is never empty
    embeddedSatFallback();
  });
}
function buildSatEntities(){
  satRecords.forEach(function(s){
    s.entity=DS.sat.entities.add({
      position:Cesium.Cartesian3.fromDegrees(0,0,700000),
      billboard:{ image:ICO.sat, width:14, height:14, scale:1,
        color:Cesium.Color.WHITE },
        // depth-tested (no disableDepthTest): satellites on the FAR side of the globe
        // are hidden behind it, so they read as anchored in 3D instead of bleeding through.
      label:{ text:(s.name||('NORAD '+s.norad)), show:GODMODE,
        font:'600 9px "JetBrains Mono", ui-monospace, monospace',
        fillColor:Cesium.Color.fromCssColorString('#9FE9FF'), outlineColor:Cesium.Color.fromCssColorString('#05070A'),
        outlineWidth:3, style:Cesium.LabelStyle.FILL_AND_OUTLINE, pixelOffset:new Cesium.Cartesian2(9,0),
        horizontalOrigin:Cesium.HorizontalOrigin.LEFT, verticalOrigin:Cesium.VerticalOrigin.CENTER,
        distanceDisplayCondition:new Cesium.DistanceDisplayCondition(0.0,15000000.0),
        disableDepthTestDistance:Number.POSITIVE_INFINITY },
      properties:{ te_layer:'sat', te:s }
    });
    s.entity._baseColor='#39C6E6';
  });
}
function updateSatPositions(){
  if(!satRecords.length) return;
  var now=new Date(); var gmst=satellite.gstime(now);
  for(var i=0;i<satRecords.length;i++){
    var s=satRecords[i]; if(!s.entity) continue;
    try{
      var pv=satellite.propagate(s.satrec,now);
      if(!pv.position){ s.entity.show=false; continue; }
      var geo=satellite.eciToGeodetic(pv.position,gmst);
      var lon=satellite.degreesLong(geo.longitude), lat=satellite.degreesLat(geo.latitude);
      s.lastGeo={lon:lon,lat:lat,alt:geo.height};
      s.lastVel=pv.velocity?Math.sqrt(pv.velocity.x*pv.velocity.x+pv.velocity.y*pv.velocity.y+pv.velocity.z*pv.velocity.z):null;
      s.entity.position=Cesium.Cartesian3.fromDegrees(lon,lat,geo.height*1000);
      if(s.entity.show===false) s.entity.show=true;
    }catch(e){ s.entity.show=false; }
  }
}
function embeddedSatFallback(){
  // ISS + Hubble + a GPS bird (epochs will be old — labelled honestly as stale model output)
  var seed=[
    ['ISS (ZARYA)','1 25544U 98067A   24170.51782528  .00016717  00000-0  30074-3 0  9998','2 25544  51.6412 021.9887 0004221  86.2529 273.9138 15.50128098 12345'],
    ['HST','1 20580U 90037B   24170.20443250  .00002319  00000-0  11201-3 0  9995','2 20580  28.4698 288.9012 0002713 300.1234 059.8765 15.09876543 98765'],
    ['GPS BIIF-2','1 37753U 11036A   24169.66666666 -.00000045  00000-0  00000+0 0  9990','2 37753  55.1234 200.4321 0071234 210.9876 148.1234  2.00561234 34567']
  ];
  seed.forEach(function(t){ try{
    var rec=satellite.twoline2satrec(t[1],t[2]);
    var epochAge=(Date.now()/86400000+2440587.5)-rec.jdsatepoch;
    satRecords.push({name:t[0],norad:t[1].substring(2,7).trim(),satrec:rec,epochAge:epochAge,entity:null});
  }catch(e){} });
  buildSatEntities();
  LAYERS.sat.count=satRecords.length; LAYERS.sat.status='degraded';
  updateSatPositions(); refreshHealth(); renderLayers();
}

/* =====================================================================
   LAYERS: satellite constellations (Starlink / GNSS / geostationary)
   The same CelesTrak TLE + SGP4 engine as the `sat` layer, generalised to
   named sets. Each set is drawn as lightweight points and is LAZY-loaded on
   first enable; only ENABLED sets are propagated each tick (so the heavy
   Starlink set costs nothing until you switch it on).
   ===================================================================== */
var CONSTELL = {
  starlink:{ groups:['starlink'], cap:1500 },
  gnss:    { groups:['gps-ops','glo-ops','galileo','beidou'], cap:null },
  geo:     { groups:['geo'], cap:null }
};
var constRecords = { starlink:[], gnss:[], geo:[] };
function loadConstellation(key){
  if(typeof satellite==='undefined'){ LAYERS[key].status='unavailable'; refreshHealth(); renderLayers(); return; }
  var cfg=CONSTELL[key]; LAYERS[key].status='loading'; refreshHealth(); renderLayers();
  Promise.all(cfg.groups.map(function(g){
    return fetchFeed(FEEDS.tle(g)).then(function(r){return r.text();}).catch(function(){return '';});
  })).then(function(texts){
    var recs=[], seen={};
    texts.forEach(function(txt){
      var lines=txt.split(/\r?\n/).filter(function(l){return l.trim().length;});
      for(var i=0;i+2<lines.length;i+=3){
        var name=lines[i].trim(), l1=lines[i+1], l2=lines[i+2];
        if(l1[0]!=='1'||l2[0]!=='2'){ i-=2; continue; }
        var norad=l1.substring(2,7).trim(); if(seen[norad]) continue; seen[norad]=1;
        try{ var rec=satellite.twoline2satrec(l1,l2);
          var epochAge=(Date.now()/86400000+2440587.5)-rec.jdsatepoch;
          recs.push({name:name,norad:norad,satrec:rec,epochAge:epochAge,entity:null});
        }catch(e){}
      }
    });
    if(cfg.cap && recs.length>cfg.cap){ // even subsample big constellations (honestly flagged)
      var step=recs.length/cfg.cap, out=[]; for(var x=0;x<recs.length;x+=step) out.push(recs[Math.floor(x)]);
      recs=out; LAYERS[key]._sampled=true;
    } else LAYERS[key]._sampled=false;
    constRecords[key]=recs; buildConstEntities(key);
    LAYERS[key].count=recs.length; LAYERS[key].status = recs.length?'live':'unavailable';
    updateConstPositions(key); refreshHealth(); renderLayers();
  }).catch(function(){ LAYERS[key].status='unavailable'; refreshHealth(); renderLayers(); });
}
function buildConstEntities(key){
  var col=LAYERS[key].color, ds=DS[key]; ds.entities.removeAll();
  var sz = key==='geo'?4:(key==='starlink'?2.5:3);
  constRecords[key].forEach(function(s){
    s.entity=ds.entities.add({
      position:Cesium.Cartesian3.fromDegrees(0,0,700000),
      // depth-tested (no disableDepthTestDistance) so far-side objects hide behind the globe
      point:{ pixelSize:sz, color:Cesium.Color.fromCssColorString(col).withAlpha(0.9) },
      properties:{ te_layer:key, te:s }
    });
    s.entity._baseColor=col;
  });
}
function updateConstPositions(key){
  var recs=constRecords[key]; if(!recs.length) return;
  var now=new Date(), gmst=satellite.gstime(now);
  for(var i=0;i<recs.length;i++){ var s=recs[i]; if(!s.entity) continue;
    try{
      var pv=satellite.propagate(s.satrec,now); if(!pv.position){ s.entity.show=false; continue; }
      var geo=satellite.eciToGeodetic(pv.position,gmst);
      var lon=satellite.degreesLong(geo.longitude), lat=satellite.degreesLat(geo.latitude);
      s.lastGeo={lon:lon,lat:lat,alt:geo.height};
      s.lastVel=pv.velocity?Math.sqrt(pv.velocity.x*pv.velocity.x+pv.velocity.y*pv.velocity.y+pv.velocity.z*pv.velocity.z):null;
      s.entity.position=Cesium.Cartesian3.fromDegrees(lon,lat,geo.height*1000);
      if(s.entity.show===false) s.entity.show=true;
    }catch(e){ s.entity.show=false; }
  }
}

/* =====================================================================
   Generic adapters + shared geo helpers
   (the checklist prefers a generic standards adapter; GDACS rides this)
   ===================================================================== */
function num(v){ var n=parseFloat(v); return isFinite(n)?n:null; }
function parseCoord(str){ // "14.9N" / "55.0W" -> signed decimal degrees
  if(str==null) return null;
  var m=String(str).trim().match(/^(-?[\d.]+)\s*([NSEWnsew]?)$/);
  if(!m) return null; var val=parseFloat(m[1]); var d=(m[2]||'').toUpperCase();
  if(d==='S'||d==='W') val=-Math.abs(val); return isFinite(val)?val:null;
}
function geoCentroid(g){ // fallback point for non-Point GeoJSON geometries
  try{
    var coords;
    if(g.type==='Point') return g.coordinates;
    else if(g.type==='Polygon') coords=g.coordinates[0];
    else if(g.type==='MultiPolygon') coords=g.coordinates[0][0];
    else if(g.type==='LineString'||g.type==='MultiPoint') coords=g.coordinates;
    else return null;
    var sx=0,sy=0,c=0; coords.forEach(function(p){ if(isFinite(p[0])&&isFinite(p[1])){sx+=p[0];sy+=p[1];c++;} });
    return c?[sx/c,sy/c]:null;
  }catch(e){ return null; }
}
function compass(deg){ if(deg==null||isNaN(deg)) return '—';
  var pts=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return pts[Math.round(((deg%360)+360)%360/22.5)%16]; }
function badgeC(color,txt){ return '<span class="badge" style="border-color:'+color+';color:'+color+
  '"><span class="d" style="background:'+color+'"></span>'+txt+'</span>'; }
/* generic GeoJSON-point adapter: FeatureCollection -> billboards. styleFn(props,feature)
   returns {icon,color,size} or null to skip. Returns the number of entities added. */
function plotGeoJSON(ds, gj, layerKey, styleFn){
  ds.entities.removeAll();
  var feats=(gj&&gj.features)||[], n=0;
  feats.forEach(function(f){
    var g=f.geometry; if(!g) return; var cen=geoCentroid(g); if(!cen) return;
    var lon=cen[0], lat=cen[1]; if(!isFinite(lon)||!isFinite(lat)) return;
    var style=styleFn(f.properties||{}, f); if(!style) return;
    var e=ds.entities.add({
      // lifted ~12 km and DEPTH-TESTED (disableDepthTestDistance:0) so markers on the far
      // side of the globe are hidden behind it — they read as anchored to their location
      // instead of floating over the disc and swimming as the camera rotates.
      position:Cesium.Cartesian3.fromDegrees(lon,lat,12000),
      billboard:{ image:style.icon, width:style.size||18, height:style.size||18,
        color:Cesium.Color.WHITE, disableDepthTestDistance:0 },
      properties:{ te_layer:layerKey, te:{ props:f.properties||{}, lon:lon, lat:lat } }
    });
    e._baseColor=style.color||'#F2A900'; n++;
  });
  return n;
}

function tcColor(kt){ return kt>=96?'#FF5964':kt>=64?'#FF7A1A':kt>=34?'#F2A900':'#39C6E6'; }
function tcCat(kt){ // Saffir–Simpson band from max sustained wind (kt)
  if(kt>=137) return 'Category 5 hurricane'; if(kt>=113) return 'Category 4 hurricane';
  if(kt>=96) return 'Category 3 hurricane'; if(kt>=83) return 'Category 2 hurricane';
  if(kt>=64) return 'Category 1 hurricane'; if(kt>=34) return 'Tropical storm';
  return 'Tropical depression';
}
var TC_BASIN={ AL:'Atlantic', EP:'E. Pacific', CP:'C. Pacific', WP:'W. Pacific', IO:'Indian Ocean', SH:'S. Hemisphere' };
function loadCyclones(){
  LAYERS.cyclone.status='loading'; refreshHealth();

    DS.cyclone.entities.removeAll();
    var storms=d.activeStorms||d.storms||[];
    storms.forEach(function(st){
      var lat=num(st.latitudeNumeric); if(lat==null) lat=parseCoord(st.latitude);
      var lon=num(st.longitudeNumeric); if(lon==null) lon=parseCoord(st.longitude);
      if(lat==null||lon==null) return;
      var kt=num(st.intensity), col=tcColor(kt==null?0:kt);
      var e=DS.cyclone.entities.add({
        position:Cesium.Cartesian3.fromDegrees(lon,lat),
        billboard:{ image:cycIcon(col), width:26, height:26, color:Cesium.Color.WHITE,
          disableDepthTestDistance:Number.POSITIVE_INFINITY },
        label:{ text:String(st.name||''),
          font:'600 10px "JetBrains Mono", ui-monospace, monospace',
          fillColor:Cesium.Color.fromCssColorString('#DDEBF5'), outlineColor:Cesium.Color.fromCssColorString('#05070A'),
          outlineWidth:3, style:Cesium.LabelStyle.FILL_AND_OUTLINE, pixelOffset:new Cesium.Cartesian2(15,0),
          horizontalOrigin:Cesium.HorizontalOrigin.LEFT, verticalOrigin:Cesium.VerticalOrigin.CENTER,
          distanceDisplayCondition:new Cesium.DistanceDisplayCondition(0.0,20000000.0),
          disableDepthTestDistance:Number.POSITIVE_INFINITY },
        properties:{ te_layer:'cyclone', te:{ st:st, lat:lat, lon:lon, kt:kt, col:col } }
      });
      e._baseColor=col;
      // movement vector (direction of travel) — a small arrow off the eye
      var dir=num(st.movementDir), spd=num(st.movementSpeed);
      if(dir!=null){

        var lat2=lat+len*Math.cos(rad);

        DS.cyclone.entities.add({ polyline:{
          positions:[Cesium.Cartesian3.fromDegrees(lon,lat),Cesium.Cartesian3.fromDegrees(lon2,lat2)],

      }

  }).catch(function(){ LAYERS.cyclone.status='unavailable'; refreshHealth(); renderLayers(); });
}

    // colour scheme 4 (Universal Blue) · smooth=1 · snow=1  →  "/256/{z}/{x}/{y}/4/1_1.png"
    var url=host+latest.path+'/256/{z}/{x}/{y}/4/1_1.png';

}

var floodAreaIndex=null; // notation -> {lat,lon,label,river,county}
function loadFloodAreas(){

    floodAreaIndex={};

function loadFloods(){

function loadFireballs(){
  LAYERS.fireball.status='loading'; refreshHealth();
  fetchFeed(FEEDS.fireball).then(function(r){return r.json();}).then(function(d){
    DS.fireball.entities.removeAll();
    var fields=d.fields||[], idx={}; fields.forEach(function(f,i){ idx[f]=i; });
    var rows=d.data||[], n=0, now=Date.now();
    rows.forEach(function(row){
      var lat=parseFloat(row[idx.lat]), lon=parseFloat(row[idx.lon]);
      if(!isFinite(lat)||!isFinite(lon)) return;
      if(String(row[idx['lat-dir']]).toUpperCase()==='S') lat=-Math.abs(lat);
      if(String(row[idx['lon-dir']]).toUpperCase()==='W') lon=-Math.abs(lon);
      var impact=parseFloat(row[idx['impact-e']]); // kt TNT
      var energy=parseFloat(row[idx.energy]);      // 10^10 J radiated
      var when=row[idx.date]?new Date(String(row[idx.date]).replace(' ','T')+'Z'):null;
      var ageD=when?((now-when.getTime())/86400000):null;
      var size=Math.max(6, Math.min(24, 6+(isFinite(impact)?Math.log10(impact+0.1)*7+7:4)));
      var fresh=(ageD!=null&&ageD<120);
      var col=fresh?'#FFD98A':'#FFB454';
      var e=DS.fireball.entities.add({
        position:Cesium.Cartesian3.fromDegrees(lon,lat, (isFinite(parseFloat(row[idx.alt]))?parseFloat(row[idx.alt]):30)*1000),
        point:{ pixelSize:size, color:Cesium.Color.fromCssColorString(col).withAlpha(0.92),
          outlineColor:Cesium.Color.fromCssColorString('#FF7A1A').withAlpha(0.6), outlineWidth:fresh?2:1,
          disableDepthTestDistance:Number.POSITIVE_INFINITY },
        properties:{ te_layer:'fireball', te:{ lat:lat, lon:lon, impact:impact, energy:energy, when:when,
          alt:parseFloat(row[idx.alt]), vel:parseFloat(row[idx.vel]) } }
      });
      e._baseColor=col; n++;
    });
    LAYERS.fireball.count=n; LAYERS.fireball.status='live';
    refreshHealth(); renderLayers();
  }).catch(function(){ LAYERS.fireball.status='unavailable'; refreshHealth(); renderLayers(); });
}

/* =====================================================================
   LAYER: GPS interference (GPSJam daily H3 CSV) — Signals / EW
   CSV columns: hex,count_good_aircraft,count_bad_aircraft. GPSJam's own
   metric is bad_frac = (bad-1)/(bad+good): <2% low, <10% medium, else high.
   We draw only medium/high cells as H3 hexagons (needs h3-js).
   ===================================================================== */
function ymd(d){ return d.getUTCFullYear()+'-'+pad(d.getUTCMonth()+1,2)+'-'+pad(d.getUTCDate(),2); }
function h3Boundary(hex){ // -> [[lng,lat], ...] ring, or null
  if(!window.h3) return null;
  try{
    var b = h3.cellToBoundary ? h3.cellToBoundary(hex,true)
          : h3.h3ToGeoBoundary ? h3.h3ToGeoBoundary(hex,true) : null; // formatAsGeoJson -> [lng,lat]
    return (b&&b.length)?b:null;
  }catch(e){ return null; }
}
function h3Center(hex){ // -> [lng,lat] or null
  if(!window.h3) return null;
  try{
    var c = h3.cellToLatLng ? h3.cellToLatLng(hex) : h3.h3ToGeo ? h3.h3ToGeo(hex) : null; // [lat,lng]
    return (c&&c.length>=2)?[c[1],c[0]]:null;
  }catch(e){ return null; }
}
function gpsColor(frac){ return frac>=0.10?'#FF5964':'#F2A900'; } // high=red, medium=amber
function parseGPSJamCSV(text){
  var lines=text.split(/\r?\n/), out=[];
  for(var i=0;i<lines.length;i++){
    var ln=lines[i]; if(!ln) continue;
    var parts=ln.split(','); if(parts.length<3) continue;
    var hex=(parts[0]||'').trim(); if(!hex || /hex/i.test(hex)) continue; // skip header / blanks
    var good=parseInt(parts[1],10), bad=parseInt(parts[2],10);
    out.push({hex:hex, good:isFinite(good)?good:0, bad:isFinite(bad)?bad:0});
  }
  return out;
}
function renderGPSJam(rows, date){
  DS.gpsjam.entities.removeAll();
  var flagged=[];
  rows.forEach(function(r){
    var denom=r.bad+r.good; if(denom<=0) return;
    var frac=(r.bad-1)/denom;   // GPSJam's own formula (the -1 damps single-aircraft noise)
    if(frac<0.02) return;       // show only medium/high interference
    flagged.push({hex:r.hex, good:r.good, bad:r.bad, frac:frac, denom:denom});
  });
  flagged.sort(function(a,b){ return b.frac-a.frac; }); // worst first
  var CAP=2500, capped=flagged.length>CAP; if(capped) flagged=flagged.slice(0,CAP);
  var drawn=0;
  flagged.forEach(function(g){
    var ring=h3Boundary(g.hex); if(!ring) return;
    var positions=[];
    for(var k=0;k<ring.length;k++){ var p=ring[k]; if(isFinite(p[0])&&isFinite(p[1])) positions.push(Cesium.Cartesian3.fromDegrees(p[0],p[1])); }
    if(positions.length<3) return;
    var col=gpsColor(g.frac), cen=h3Center(g.hex)||[null,null];
    var e=DS.gpsjam.entities.add({
      polygon:{ hierarchy:positions, material:Cesium.Color.fromCssColorString(col).withAlpha(0.32),
        outline:true, outlineColor:Cesium.Color.fromCssColorString(col).withAlpha(0.85),
        height:0, arcType:Cesium.ArcType.GEODESIC },
      properties:{ te_layer:'gpsjam', te:{ hex:g.hex, good:g.good, bad:g.bad, frac:g.frac, denom:g.denom, date:date, lon:cen[0], lat:cen[1] } }
    });
    e._baseColor=col; drawn++;
  });
  LAYERS.gpsjam.count=drawn; LAYERS.gpsjam.status='live'; LAYERS.gpsjam._date=date; LAYERS.gpsjam._capped=capped;
  refreshHealth(); renderLayers();
  if(window.console&&console.info) console.info('[gpsjam] '+date+' — '+drawn+' interference cells'+(capped?(' (capped at '+CAP+')'):''));
}
function loadGPSJam(){
  if(!window.h3){ LAYERS.gpsjam.status='unavailable'; refreshHealth(); renderLayers();
    if(window.console&&console.info) console.info('[gpsjam] h3-js unavailable — GPS interference layer disabled'); return; }
  LAYERS.gpsjam.status='loading'; refreshHealth();
  var now=new Date();
  // yesterday first (a complete UTC day), then 2 days back, then today (often partial)
  var dates=[ ymd(new Date(now.getTime()-86400000)), ymd(new Date(now.getTime()-2*86400000)), ymd(now) ];
  var i=0;
  (function tryDate(){
    if(i>=dates.length){ LAYERS.gpsjam.status='unavailable'; refreshHealth(); renderLayers(); return; }
    var date=dates[i++];
    fetchFeed(FEEDS.gpsjam(date)).then(function(r){return r.text();}).then(function(txt){
      if(!txt || txt.charAt(0)==='<') throw new Error('not csv'); // guard HTML 404 pages
      renderGPSJam(parseGPSJamCSV(txt), date);
    }).catch(function(){ tryDate(); });
  })();
}
function intelGPS(t){
  $('#intelType').textContent='SIGNALS · GPS INTERFERENCE';
  var pct=Math.max(0,t.frac*100), high=t.frac>=0.10;

  html+='<div class="badges">'+badgeC('#39C6E6','INFERRED · GPSJAM')+badgeC(col,lvl+' INTERFERENCE')+'</div>';

  $('#intelBody').innerHTML=html;

/* =====================================================================
   LAYER: submarine cables (TeleGeography) — Infrastructure
   Cable routes as polylines (per-cable colour) + landing points as markers.
   ===================================================================== */
function loadCables(){
  LAYERS.cables.status='loading'; refreshHealth(); renderLayers();
  Promise.all([
    fetchFeed(FEEDS.cables).then(function(r){return r.json();}).catch(function(){return null;}),
    fetchFeed(FEEDS.landings).then(function(r){return r.json();}).catch(function(){return null;})
  ]).then(function(res){
    var cg=res[0], lp=res[1];
    if(!cg && !lp){ LAYERS.cables.status='unavailable'; refreshHealth(); renderLayers(); return; }
    DS.cables.entities.removeAll();
    var lines=0, pts=0;
    if(cg && cg.features){
      cg.features.forEach(function(f){
        var p=f.properties||{}, col=p.color||'#39C6E6', name=p.name||'', id=p.id||'';
        var g=f.geometry; if(!g) return;
        var parts = g.type==='MultiLineString'? g.coordinates : (g.type==='LineString'? [g.coordinates] : []);
        parts.forEach(function(seg){
          if(!seg||seg.length<2) return;
          var pos=[];
          for(var k=0;k<seg.length;k++){ var c=seg[k]; if(isFinite(c[0])&&isFinite(c[1])) pos.push(Cesium.Cartesian3.fromDegrees(c[0],c[1])); }
          if(pos.length<2) return;
          var e=DS.cables.entities.add({
            polyline:{ positions:pos, width:1.6, arcType:Cesium.ArcType.GEODESIC,
              material:Cesium.Color.fromCssColorString(col).withAlpha(0.75) },
            properties:{ te_layer:'cables', te:{ type:'cable', id:id, name:name, color:col } }
          });
          e._baseColor=col; lines++;
        });
      });
    }
    if(lp && lp.features){
      lp.features.forEach(function(f){
        var g=f.geometry; if(!g||g.type!=='Point') return;
        var c=g.coordinates; if(!isFinite(c[0])||!isFinite(c[1])) return;
        var p=f.properties||{};
        var e=DS.cables.entities.add({
          position:Cesium.Cartesian3.fromDegrees(c[0],c[1]),
          point:{ pixelSize:4, color:Cesium.Color.fromCssColorString('#CFE6FF').withAlpha(0.85),
            outlineColor:Cesium.Color.fromCssColorString('#0A0E14').withAlpha(0.6), outlineWidth:1,
            disableDepthTestDistance:Number.POSITIVE_INFINITY },
          properties:{ te_layer:'cables', te:{ type:'landing', id:p.id||'', name:p.name||'', lon:c[0], lat:c[1] } }
        });
        e._baseColor='#CFE6FF'; pts++;
      });
    }
    LAYERS.cables.count=lines; LAYERS.cables._landings=pts; LAYERS.cables.status='live';
    refreshHealth(); renderLayers();
  }).catch(function(){ LAYERS.cables.status='unavailable'; refreshHealth(); renderLayers(); });
}

function fltColor(cat){ return cat==='LIFR'?'#E06AFF':cat==='IFR'?'#FF5964':cat==='MVFR'?'#39C6E6':cat==='VFR'?'#37E0A0':'#7C8794'; }

function intelMETAR(t){

  var obs=(m.obsTime!=null&&isFinite(+m.obsTime))?new Date((+m.obsTime)*1000):null;

var lazyLoaded = {};
function applyVisibility(){

function setLayerOpacity(id,val){

    var base=e._baseColor||'#ffffff';
    if(e.billboard){ e.billboard.color=Cesium.Color.WHITE.withAlpha(val); } // canvas icons are pre-coloured
    if(e.point){ e.point.color=Cesium.Color.fromCssColorString(base).withAlpha(0.9*val);
      e.point.outlineColor=Cesium.Color.fromCssColorString(base).withAlpha(0.35*val); }

function selectEntity(e){

    e.billboard.width=ow*1.5; e.billboard.height=(e.billboard.height.getValue?e.billboard.height.getValue():e.billboard.height)*1.5;
    if(layer==='sat') e.billboard.image=ICO.satSel; else if(layer==='launch') e.billboard.image=ICO.launchSel;

      if(layer==='sat') e.billboard.image=ICO.sat; else if(layer==='launch') e.billboard.image=ICO.launch; };
  } else if(e.point){ var op=e._baseColor;
    e.point.outlineColor=Cesium.Color.fromCssColorString('#F2A900'); e.point.outlineWidth=3;
    selectedRestore=function(){ e.point.outlineColor=Cesium.Color.fromCssColorString(op).withAlpha(0.35); e.point.outlineWidth=1; };
  } else if(e.polygon){ var pb=e._baseColor||'#F2A900';

    e.polygon.outlineColor=Cesium.Color.fromCssColorString('#F2A900');

      e.polygon.outlineColor=Cesium.Color.fromCssColorString(pb).withAlpha(0.85); };
  } else if(e.polyline){ var lb=e._baseColor||'#39C6E6';
    var ow=(e.polyline.width&&e.polyline.width.getValue)?e.polyline.width.getValue(viewer.clock.currentTime):e.polyline.width;
    e.polyline.material=Cesium.Color.fromCssColorString('#F2A900').withAlpha(0.95); e.polyline.width=Math.max(3,(ow||1.6)*2);
    selectedRestore=function(){ e.polyline.material=Cesium.Color.fromCssColorString(lb).withAlpha(0.75); e.polyline.width=ow; };
  }
  if(layer==='sat'||layer==='starlink'||layer==='gnss'||layer==='geo'){ intelSat(te); }
  else if(layer==='quake'){ intelQuake(te); }
  else if(layer==='cables'){ intelCables(te); }

/* orbit path for a selected satellite */
var orbitEntity=null, orbitFor=null;
function toggleOrbit(s){
  if(orbitFor===s && orbitEntity){ DS.sat.entities.remove(orbitEntity); orbitEntity=null; orbitFor=null; return; }
  if(orbitEntity){ DS.sat.entities.remove(orbitEntity); orbitEntity=null; }
  var pts=[], now=new Date();
  var periodMin=2*Math.PI/s.satrec.no; // no = mean motion (rad/min)
  for(var m=0;m<=periodMin;m+=Math.max(1,periodMin/180)){
    var t=new Date(now.getTime()+m*60000);
    try{ var pv=satellite.propagate(s.satrec,t); if(!pv.position) continue;
      var geo=satellite.eciToGeodetic(pv.position,satellite.gstime(t));
      pts.push(Cesium.Cartesian3.fromDegrees(satellite.degreesLong(geo.longitude),satellite.degreesLat(geo.latitude),geo.height*1000));
    }catch(e){}
  }
  if(pts.length>2){ orbitEntity=DS.sat.entities.add({ polyline:{ positions:pts, width:1.4,
    material:Cesium.Color.fromCssColorString('#F2A900').withAlpha(0.7), arcType:Cesium.ArcType.NONE } });
    orbitFor=s; }
}

var measureDS, geofenceDS, gfHLDS;
var toolMode=null, draft=null, mouseCart=null, geofences=[], gfSeq=0, leftTab='layers';
var C_AMBER='#F2A900', C_RED='#FF5964', C_DARK='#05070A';
function Ccss(h,a){ var c=Cesium.Color.fromCssColorString(h); return a==null?c:c.withAlpha(a); }
function pickGlobe(pos){ var ray=camera.getPickRay(pos); return (ray&&scene.globe.pick(ray,scene))||null; }
function cOf(c3){ return Cesium.Cartographic.fromCartesian(c3); }
function distM(a,b){ return new Cesium.EllipsoidGeodesic(a,b).surfaceDistance; }        // a,b carto
function bearingOf(a,b){ return (Cesium.Math.toDegrees(new Cesium.EllipsoidGeodesic(a,b).startHeading)+360)%360; }
function fmtDist(m){ return m>=1000?(m/1000).toFixed(m>=100000?0:1)+' km':Math.round(m)+' m'; }
function fmtNm(m){ return (m/1852).toFixed(m>=185200?0:1)+' nm'; }
function removeEnt(ds,e){ if(e){ try{ ds.entities.remove(e); }catch(_){} } }
function toast(msg){ var t=$('#toast'); if(!t) return; t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(function(){ t.classList.remove('show'); },3600); }
function staticLabel(text, off){ return { text:text, font:'600 11px "JetBrains Mono", ui-monospace, monospace',
  fillColor:Ccss('#FFE08A'), outlineColor:Ccss(C_DARK), outlineWidth:3, style:Cesium.LabelStyle.FILL_AND_OUTLINE,
  showBackground:true, backgroundColor:Ccss('#05070A',0.72), pixelOffset:off||new Cesium.Cartesian2(0,-12),
  disableDepthTestDistance:Number.POSITIVE_INFINITY }; }

function toolStatus(){ return toolMode==='ruler'?'RULER — click points; right-click / Enter to finish':
  toolMode==='ring'?'RANGE RING — click centre, then click to set the radius':
  toolMode==='geofence'?'GEOFENCE — click centre, then click to set the radius':
  ('ready · '+(HOSTED?'proxied feeds':'direct feeds')); }
function setTool(mode){
  if(draft) finishDraft(true);
  toolMode=(toolMode===mode)?null:mode;
  document.body.classList.toggle('tool-active', !!toolMode);
  $$('#tools button[data-tool]').forEach(function(b){ b.classList.toggle('on', b.dataset.tool===toolMode); });
  $('#status').textContent=toolStatus();
}
function draftRadius(){ if(!draft||!draft.centerCarto||!mouseCart) return 0.1; return Math.max(0.1, distM(draft.centerCarto,cOf(mouseCart))); }
function rulerTotal(pts){ var t=0; for(var i=1;i<pts.length;i++) t+=distM(cOf(pts[i-1]),cOf(pts[i])); return t; }
function rulerTip(){ if(!draft||!draft.pts.length||!mouseCart) return '';
  var last=draft.pts[draft.pts.length-1], mc=cOf(mouseCart), lc=cOf(last);
  var leg=distM(lc,mc), brg=bearingOf(lc,mc), tot=rulerTotal(draft.pts)+leg;
  return fmtDist(leg)+' · '+Math.round(brg)+'° · Σ '+fmtDist(tot)+' ('+fmtNm(tot)+')'; }
function toolClick(pos){
  var cart=pickGlobe(pos); if(!cart) return;                 // clicked off the globe
  if(toolMode==='ruler'){
    if(!draft){ draft={type:'ruler', pts:[], dots:[]};
      draft.rubber=measureDS.entities.add({ polyline:{ positions:new Cesium.CallbackProperty(function(){
        var arr=draft?draft.pts.slice():[]; if(mouseCart) arr=arr.concat([mouseCart]); return arr.length>=2?arr:[]; },false),
        width:2, arcType:Cesium.ArcType.GEODESIC, material:Ccss(C_AMBER,0.95) } });
    }
    draft.pts.push(cart);
    draft.dots.push(measureDS.entities.add({ position:cart,
      point:{ pixelSize:5, color:Ccss(C_AMBER), outlineColor:Ccss(C_DARK,0.7), outlineWidth:1, disableDepthTestDistance:0 } }));
  } else {                                                    // ring | geofence
    if(!draft) draft={type:toolMode, center:null};
    if(!draft.center){
      draft.center=cart; draft.centerCarto=cOf(cart);
      draft.dot=measureDS.entities.add({ position:cart,
        point:{ pixelSize:5, color:Ccss(C_AMBER), outlineColor:Ccss(C_DARK,0.7), outlineWidth:1, disableDepthTestDistance:0 } });
      draft.rubber=measureDS.entities.add({ position:cart, ellipse:{
        semiMajorAxis:new Cesium.CallbackProperty(draftRadius,false), semiMinorAxis:new Cesium.CallbackProperty(draftRadius,false),
        material:Ccss(C_AMBER,0.06), outline:true, outlineColor:Ccss(C_AMBER,0.9), outlineWidth:2, height:0 } });
    } else {
      var r=distM(draft.centerCarto, cOf(cart)); if(r<10){ return; }
      commitRadial(draft, r); draft=null; $('#status').textContent=toolStatus();
    }
  }
}
function commitRadial(d, r){
  removeEnt(measureDS, d.rubber);
  if(d.type!=='geofence'){                                    // range ring: 3 concentric rings + label
    [0.25,0.5,1].forEach(function(f,i){
      measureDS.entities.add({ position:d.center, ellipse:{ semiMajorAxis:r*f, semiMinorAxis:r*f,
        material:Ccss(C_AMBER, i===2?0.04:0.0), outline:true, outlineColor:Ccss(C_AMBER, i===2?0.9:0.4),
        outlineWidth:i===2?2:1, height:0 } }); });
    measureDS.entities.add({ position:d.center, label:staticLabel(fmtDist(r)+'  ('+fmtNm(r)+')') });
    toast('Range ring · '+fmtDist(r)+' radius');
  } else {                                                    // geofence: watched zone
    var name='GEOFENCE '+(++gfSeq);
    geofenceDS.entities.add({ position:d.center, ellipse:{ semiMajorAxis:r, semiMinorAxis:r,
      material:Ccss(C_AMBER,0.08), outline:true, outlineColor:Ccss(C_AMBER,0.9), outlineWidth:2, height:0 } });
    var lbl=geofenceDS.entities.add({ position:d.center,
      label:staticLabel(name+'  ·  0 inside', new Cesium.Cartesian2(0,-14)) });
    lbl.label.fillColor=Ccss(C_AMBER);
    geofences.push({ name:name, center:d.center, centerCarto:d.centerCarto, radius:r, entity:lbl, inside:{}, count:0 });
    toast('Geofence set · '+fmtDist(r)+' radius — watching aircraft');
    checkGeofences();
  }
}
function finishDraft(cancel){
  if(!draft) return;
  removeEnt(measureDS, draft.rubber); removeEnt(measureDS, draft.dot);
  if(draft.type==='ruler'){
    if(cancel || draft.pts.length<2){ (draft.dots||[]).forEach(function(e){ removeEnt(measureDS,e); }); }
    else {
      var pts=draft.pts.slice();
      measureDS.entities.add({ polyline:{ positions:pts, width:2, arcType:Cesium.ArcType.GEODESIC, material:Ccss(C_AMBER,0.9) } });
      var tot=rulerTotal(pts);
      measureDS.entities.add({ position:pts[pts.length-1],
        label:staticLabel('Σ '+fmtDist(tot)+'  ('+fmtNm(tot)+')', new Cesium.Cartesian2(12,-12)) });
    }
  }
  draft=null; if(toolMode) $('#status').textContent=toolStatus();
}
function clearTools(){
  if(draft) finishDraft(true);

  if(geofenceDS) geofenceDS.entities.removeAll();

/* geofence monitoring: which aircraft are inside each zone (with new-entrant alerts) */
function checkGeofences(){
  if(!gfHLDS) return; gfHLDS.entities.removeAll();
  if(!geofences.length || !DS.air) return;
  var t=viewer.clock.currentTime, ac=DS.air.entities.values;
  geofences.forEach(function(gf){
    var insideNow={}, cnt=0, newly=[];
    ac.forEach(function(e){
      if(!e.position||!e.properties||!e.properties.te_layer) return;
      var lyr=e.properties.te_layer.getValue?e.properties.te_layer.getValue():e.properties.te_layer;
      if(lyr!=='air') return;
      var p=e.position.getValue(t); if(!p) return;
      if(distM(gf.centerCarto, cOf(p))>gf.radius) return;
      var te=e.properties.te&&e.properties.te.getValue&&e.properties.te.getValue(), a=te&&te.a;
      var id=(a&&(a.hex||a.flight))||String(e.id), nm=(a&&((a.flight||'').trim()||a.hex))||id;
      insideNow[id]=nm; cnt++; if(!gf.inside[id]) newly.push(nm);
      gfHLDS.entities.add({ position:p, point:{ pixelSize:16, color:Ccss(C_RED,0.0),
        outlineColor:Ccss(C_RED,0.9), outlineWidth:2, disableDepthTestDistance:Number.POSITIVE_INFINITY } });
    });
    gf.inside=insideNow; gf.count=cnt;
    if(gf.entity&&gf.entity.label){ gf.entity.label.text=gf.name+'  ·  '+cnt+' inside';
      gf.entity.label.fillColor=Ccss(cnt?C_RED:C_AMBER); }
    if(newly.length){ toast('▲ '+newly.length+' entered '+gf.name+': '+newly.slice(0,3).join(', ')+(newly.length>3?'…':'')); }
  });
}

/* ---- Events list (left dock, Events tab) ---- */
var EVENT_LAYERS=['air','quake','hazard','cyclone','gdacs','floods','launch','fireball','metar'];
var EVENT_META={ air:['AIR','#F2A900'], quake:['SEIS','#37E0A0'], hazard:['HAZ','#FF7A1A'], cyclone:['TC','#39C6E6'],
  gdacs:['GDACS','#F2A900'], floods:['FLOOD','#5B8CFF'], launch:['LNCH','#9B8CFF'], fireball:['BOLIDE','#FFB454'], metar:['METAR','#37E0A0'] };
function eventRowData(k, te){
  var a,L,m,p;
  if(k==='air'){ a=te.a||{}; return {title:((a.flight||'').trim()||a.hex||a.r||'UNKNOWN'),
    sub:(a.t||'')+(a.alt_baro!=null?(' · '+(a.alt_baro==='ground'?'GND':a.alt_baro+' ft')):'')}; }
  if(k==='quake'){ return {title:'M '+(te.mag!=null?te.mag.toFixed(1):'—'), sub:(te.f&&te.f.properties&&te.f.properties.place)||''}; }
  if(k==='hazard'){ return {title:(te.ev&&te.ev.title)||'Event', sub:te.cat||''}; }
  if(k==='cyclone'){ return {title:(te.st&&te.st.name)||'Cyclone', sub:tcCat(te.kt==null?0:te.kt)}; }
  if(k==='gdacs'){ p=te.props||{}; return {title:p.name||GDACS_TYPE[p.eventtype]||'Alert', sub:(GDACS_TYPE[p.eventtype]||'')+(p.alertlevel?(' · '+p.alertlevel):'')}; }
  if(k==='floods'){ return {title:floodSevName(te.lvl), sub:(te.geo&&te.geo.label)||''}; }
  if(k==='launch'){ L=te.L||{}; return {title:L.name||'Launch', sub:(L.launch_service_provider&&L.launch_service_provider.name)||''}; }
  if(k==='fireball'){ return {title:(isFinite(te.impact)?te.impact+' kt':'Fireball'), sub:te.when?new Date(te.when).toISOString().slice(0,10):''}; }
  if(k==='metar'){ m=te.m||{}; return {title:m.icaoId||'METAR', sub:(m.fltCat||'')+(m.name?(' · '+m.name):'')}; }
  return {title:k, sub:''};
}
function renderEvents(){
  var body=$('#eventBody'); if(!body) return;
  var q=($('#laySearch').value||'').toLowerCase(); body.innerHTML=''; var total=0;
  EVENT_LAYERS.forEach(function(k){
    var ds=DS[k]; if(!ds) return; var meta=EVENT_META[k]||[k,'#7C8794']; var rows=[];
    ds.entities.values.forEach(function(e){
      if(!e.properties||!e.properties.te_layer) return;
      var lyr=e.properties.te_layer.getValue?e.properties.te_layer.getValue():e.properties.te_layer;
      if(lyr!==k) return;
      var te=e.properties.te&&e.properties.te.getValue&&e.properties.te.getValue(); if(!te) return;
      var d=eventRowData(k,te);
      if(q && (d.title+' '+d.sub+' '+meta[0]).toLowerCase().indexOf(q)<0) return;
      rows.push({d:d, e:e});
    });
    if(!rows.length) return; total+=rows.length;
    var gh=el('div','lgroup'); gh.appendChild(el('div','gh',meta[0]+' · '+rows.length)); body.appendChild(gh);
    rows.slice(0,120).forEach(function(r){
      var row=el('div','erow');
      var dot=el('span','edot'); dot.style.background=meta[1]; row.appendChild(dot);
      var mt=el('div','emeta'); mt.appendChild(el('div','etitle',r.d.title)); mt.appendChild(el('div','esub',r.d.sub||'')); row.appendChild(mt);
      row.onclick=function(){ flyToEntity(r.e); }; body.appendChild(row);
    });
    if(rows.length>120) body.appendChild(el('div','emore','+'+(rows.length-120)+' more…'));
  });
  if(!total) body.appendChild(el('div','eempty','No live events in the enabled layers yet. Turn layers on, or give the feeds a moment to load.'));
  if(leftTab==='events') $('#layChip').textContent=total+' EVENTS';
}
function setLeftTab(tab){
  leftTab=tab;
  $('#tabLayers').classList.toggle('on',tab==='layers'); $('#tabEvents').classList.toggle('on',tab==='events');
  $('#layerBody').style.display = tab==='layers'?'':'none';
  $('#eventBody').style.display = tab==='events'?'':'none';
  $('#laySearch').placeholder = tab==='layers'?'Filter layers…':'Filter events…';
  if(tab==='events') renderEvents(); else renderLayers();
}

/* ---- Shareable views (camera + active layers in the URL hash) ---- */
function buildShareURL(){
  var c=camera.positionCartographic;
  var lon=Cesium.Math.toDegrees(c.longitude).toFixed(3), lat=Cesium.Math.toDegrees(c.latitude).toFixed(3), h=Math.round(c.height);
  var head=Math.round(Cesium.Math.toDegrees(camera.heading)), pit=Math.round(Cesium.Math.toDegrees(camera.pitch));
  var on=Object.keys(LAYERS).filter(function(k){return LAYERS[k].on;}).join(',');
  var base=(location.origin&&location.origin!=='null')?(location.origin+location.pathname):location.pathname;
  return base+'#v='+lon+','+lat+','+h+','+head+','+pit+'&l='+on;
}
function shareView(){
  if(!camera){ toast('View not ready yet'); return; }
  var url=buildShareURL();
  try{ location.hash=url.split('#')[1]||''; }catch(_){}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){ toast('View link copied to clipboard'); },
      function(){ toast('View link is in the address bar'); });
  } else { toast('View link is in the address bar'); }
}
function restoreView(){
  var h=location.hash||''; if(h.indexOf('v=')<0 && h.indexOf('l=')<0) return;
  var params={}; h.replace(/^#/,'').split('&').forEach(function(kv){ var i=kv.indexOf('='); if(i>0) params[kv.slice(0,i)]=decodeURIComponent(kv.slice(i+1)); });
  if(params.l!=null){ var on={}; params.l.split(',').forEach(function(k){ if(k) on[k]=1; });
    Object.keys(LAYERS).forEach(function(k){ LAYERS[k].on=!!on[k]; }); applyVisibility(); renderLayers(); }
  if(params.v){ var p=params.v.split(',').map(Number);
    if(p.length>=3 && isFinite(p[0]) && isFinite(p[1])){
      camera.setView({ destination:Cesium.Cartesian3.fromDegrees(p[0],p[1],p[2]||17000000),
        orientation:{ heading:Cesium.Math.toRadians(p[3]||0), pitch:Cesium.Math.toRadians(isFinite(p[4])?p[4]:-90), roll:0 } }); } }
}

/* =====================================================================
   Boot sequence
   ===================================================================== */
setInterval(tickClock,1000); tickClock();

loadCesium().then(function(){
  return loadSat(); // non-fatal if it fails
}).then(function(){
  return loadH3(); // non-fatal: only the GPS-interference layer depends on it
}).then(function(){
  initViewer(); setupHUD(); wireUI(); refreshHealth(); renderLayers();
  restoreView();                                                   // apply a shared #v=…&l=… view if present
  $('#boot').classList.add('gone');
  $('#status').textContent='ready · '+(HOSTED?'proxied feeds':'direct feeds');
  // kick off data
  loadSatellites();
  loadQuakes();
  loadAircraft();
  loadHazards();
  loadLaunches();
  loadAurora();
  loadCyclones();
  loadGDACS();
  loadRadar();
  loadFloods();
  loadFireballs();
  loadGPSJam();
  // refresh loops (respect upstream rate limits)
  setInterval(updateAllSats,1000);                                 // base sats + any enabled constellation, 1 Hz
  setInterval(function(){ if(!SIM_ON) loadAircraft(); },20000);   // airplanes.live: 1 req/s cap → poll slow
  setInterval(loadQuakes,120000);                                  // USGS updates ~1/min; we poll every 2m
  setInterval(loadHazards,900000);                                 // EONET updates ~hourly → poll every 15m
  setInterval(loadLaunches,1800000);                               // Launch Library 2: ~15 req/hr → poll every 30m
  setInterval(loadAurora,600000);                                  // OVATION now-cast → poll every 10m
  setInterval(loadCyclones,900000);                                // NHC advisories ~3-6h → poll every 15m
  setInterval(loadGDACS,600000);                                   // GDACS event list → poll every 10m
  setInterval(loadRadar,300000);                                   // RainViewer frames every ~10m → refresh every 5m
  setInterval(loadFloods,600000);                                  // EA flood warnings update ~15m → poll every 10m
  setInterval(loadFireballs,1800000);                              // CNEOS fireballs sporadic → poll every 30m
  setInterval(loadGPSJam,21600000);                                // GPSJam is a daily file → refresh every 6h
  setInterval(function(){ if(lazyLoaded.metar) loadMETAR(); },600000); // METAR hourly → refresh every 10m when shown
  setInterval(checkGeofences,5000);                                // re-check watch zones every 5s
  setInterval(function(){ if(leftTab==='events') renderEvents(); },5000); // keep the events list fresh
}).catch(function(err){
  bootError('ThirdEye could not load the 3D globe engine (CesiumJS) from its CDNs.<br><br>'+
    'This is almost always a network/blocked-CDN issue. When you host this on Netlify or open it on a normal connection it will load.<br><br><span class="mono" style="font-size:10px;color:#4C5661">'+esc(String(err&&err.message||err))+'</span>');
});

/* expose a couple of handles for the console / future wiring */
window.ThirdEye={ get viewer(){return viewer;}, LAYERS:LAYERS, setSim:setSim, setMode:setMode,
  _renderLayers:renderLayers, _refreshHealth:refreshHealth,
  setTool:setTool, clearTools:clearTools, setLeftTab:setLeftTab, shareView:shareView };
})();
</script>
